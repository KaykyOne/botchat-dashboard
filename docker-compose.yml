services:
  # Dashboard Next.js
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard-app
    ports:
      - "3000:3000"
    env_file:
      - ./dashboard/.env
    restart: unless-stopped
    networks:
      - app-network

  # Bot Express
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot-app
    ports:
      - "5000:5000"
    env_file:
      - ./bot/.env
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./bot/sessions:/app/sessions
      - ./bot/prisma/sessions:/app/prisma/sessions

  # Nginx
  nginx:
    image: nginx:latest
    container_name: nginx-reverse-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - bot
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
