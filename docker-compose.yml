services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard-app
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - ./dashboard/.env
    environment:
      BOT_INTERNAL_URL: http://bot:3001
    restart: unless-stopped
    depends_on:
      - bot
    networks:
      - app-network

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot-app
    expose:
      - "3001"
    env_file:
      - ./bot/.env
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./bot/src/bots/baileys/sessions:/app/src/bots/baileys/sessions
      - ./bot/src/bots/whatsapp_web/sessions:/app/src/bots/whatsapp_web/sessions

networks:
  app-network:
    driver: bridge
