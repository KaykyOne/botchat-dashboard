name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  DEPLOY_PATH: /var/www/novus-cfc

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dashboard/package-lock.json
            bot/package-lock.json

      - name: Validar dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Validar bot
        working-directory: bot
        run: npm ci

      - name: Preparar pasta remota
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p "${{ env.DEPLOY_PATH }}"

      - name: Enviar arquivos do projeto
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,dashboard,bot"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 0

      - name: Gerar envs e subir containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu

            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "Docker Compose nao encontrado na VPS"
              exit 1
            fi

            cd "${{ env.DEPLOY_PATH }}"

            mkdir -p dashboard
            mkdir -p bot
            mkdir -p bot/src/bots/baileys/sessions
            mkdir -p bot/src/bots/whatsapp_web/sessions

            cat > dashboard/.env <<EOF
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            EOF

            cat > bot/.env <<EOF
            OPENAI_KEY=${{ secrets.OPENAI_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            PORT=3001
            WHATSAPP_PROVIDER=${{ secrets.WHATSAPP_PROVIDER }}
            EOF

            chmod 600 dashboard/.env bot/.env

            $DC up -d --build --remove-orphans
